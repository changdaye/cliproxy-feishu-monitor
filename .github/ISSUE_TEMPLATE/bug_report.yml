name: Bug report
description: 反馈一个可复现的问题
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 清楚描述你遇到的问题
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 按步骤说明如何复现
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: 环境信息
      description: 如系统、Go 版本、部署方式、命令输出等
